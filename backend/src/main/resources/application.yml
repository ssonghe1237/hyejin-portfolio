server:
  port: 8081

spring:
  application:
    name: portfolio-backend

  profiles:
    active: local

  config:
    import: optional:classpath:application-local.yml

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true